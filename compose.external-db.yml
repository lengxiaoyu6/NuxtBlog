services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ""
        NPM_REGISTRY: ""
    image: nuxt-blog:latest
    restart: unless-stopped
    environment:
      NUXT_SESSION_PASSWORD: change-this-session-secret-at-least-32-chars
      DATABASE_URL: mysql://db-user:db-password@db.example.com:3306/nuxt-blog
      SECURITY_HASH_SALT: change-this-security-hash-salt
      TURNSTILE_SECRET_KEY: ""
    ports:
      - "3000:3000"
    volumes:
      - blog-media:/app/storage/media

volumes:
  blog-media:
